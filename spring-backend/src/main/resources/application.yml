spring:
  application:
    name: ravenblog-spring-backend
  jpa:
    hibernate:
      ddl-auto: validate
      naming:
        # Preserve Prisma's case-sensitive quoted identifiers (for example, "User").
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    open-in-view: false

app:
  jwt:
    # Deliberately shares the existing Node.js/Worker signing secret.
    secret: ${SECRET}
